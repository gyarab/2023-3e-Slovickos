<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sing Up</title>
</head>
<body>
    
    {% for message in messages %}
    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
        <strong>Message:</strong> {{ message }}
        <button type="button" class="close" data-dismiss="alert" aria-label="Close">
    <span aria-hidden="true">&times;</span>
  </button>
    </div>
    {% endfor %}

    <h3>Sing Up</h3>

    <form action="/signUp" method="post">
        {% csrf_token %}
        <label for="">Username</label>
        <input type="text" id="username" name="username" placeholder="Create a username">
        <br>

        <label for="">First Name</label>
        <input type="text" id="fname" name="fname" placeholder="Enter your first name">
        <br>

        <label for="">Last Name</label>
        <input type="text" id="lname" name="lname" placeholder="Enter your last name">
        <br>

        <label for="">Email Address<label>
        <input type="email" id="email" name="email" placeholder="Enter yout e-mail">
        <br>

        <label for="">Password</label>
        <input type="password" id="password1" name="password" placeholder="Enter a Password">
        <br>

        <label for="">Confirm Password</label>
        <input type="password" id="password2" name="password2" placeholder="Confirm your Password">
        <br>

        <button type="submit">signUp</button>
    </form>
</body>
</html>
